name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pytest

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate Compose examples
        env:
          APP_HOST: podcasts.example.com
        run: |
          docker compose config --quiet
          docker compose -f compose.yaml -f compose.traefik.example.yaml config --quiet
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: false
